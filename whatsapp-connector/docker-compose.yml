services:
  whatsapp-connector:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: whatsapp-connector:latest
    container_name: whatsapp-connector
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SESSION_PATH: /app/sessions
      MAX_SESSIONS: ${MAX_SESSIONS:-10}
      SESSION_PROVIDER: ${SESSION_PROVIDER:-filesystem}
      RECONNECT_INTERVAL_MS: ${RECONNECT_INTERVAL_MS:-5000}
      MAX_RECONNECT_ATTEMPTS: ${MAX_RECONNECT_ATTEMPTS:-5}
      HEARTBEAT_INTERVAL_MS: ${HEARTBEAT_INTERVAL_MS:-30000}
      ENABLE_WEBSOCKET: ${ENABLE_WEBSOCKET:-true}
      ENABLE_EVENTS: ${ENABLE_EVENTS:-true}
      ENABLE_VALKEY: ${ENABLE_VALKEY:-}
      VALKEY_URL: ${VALKEY_URL:-}
      # Deprecated aliases: remove after all environments migrate to Valkey names.
      ENABLE_REDIS: ${ENABLE_REDIS:-}
      REDIS_URL: ${REDIS_URL:-}
      AUTH_STATE_ENCRYPTION_KEY: ${AUTH_STATE_ENCRYPTION_KEY:?AUTH_STATE_ENCRYPTION_KEY must be configured}
      ENABLE_POSTGRES: ${ENABLE_POSTGRES:-false}
      DATABASE_URL: ${DATABASE_URL:-}
      WEBHOOK_ENABLED: ${WEBHOOK_ENABLED:-false}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      CORS_ENABLED: ${CORS_ENABLED:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      MAX_MEDIA_SIZE_MB: ${MAX_MEDIA_SIZE_MB:-16}
      RATE_LIMIT_MAX_PER_MINUTE: ${RATE_LIMIT_MAX_PER_MINUTE:-20}
      RATE_LIMIT_MIN_DELAY_MS: ${RATE_LIMIT_MIN_DELAY_MS:-500}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      API_KEYS: ${API_KEYS:?API_KEYS must be configured}
      HTTP_RATE_LIMIT_TTL_MS: ${HTTP_RATE_LIMIT_TTL_MS:-60000}
      HTTP_RATE_LIMIT_MAX: ${HTTP_RATE_LIMIT_MAX:-120}
      HEALTH_MAX_HEAP_MB: ${HEALTH_MAX_HEAP_MB:-1024}
    volumes:
      - sessions_data:/app/sessions
    networks:
      - whatsapp-platform
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      valkey:
        condition: service_healthy
        required: false
      postgres:
        condition: service_healthy
        required: false

  # ── Optional: Valkey (RESP compatible) ────────────────────────
  valkey:
    image: valkey/valkey:9.1.0-alpine
    container_name: whatsapp-connector-valkey
    restart: unless-stopped
    profiles: ["valkey"]
    command: valkey-server --appendonly yes
    volumes:
      - valkey_data:/data
    networks:
      - whatsapp-platform
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Optional: PostgreSQL ───────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: whatsapp-connector-postgres
    restart: unless-stopped
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: whatsapp_connector
      POSTGRES_USER: ${POSTGRES_USER:-wac}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be configured}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - whatsapp-platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wac} -d whatsapp_connector"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Optional: RabbitMQ shared event bus ───────────────────────
  rabbitmq:
    image: rabbitmq:4.3.2-management-alpine
    container_name: whatsapp-platform-rabbitmq
    restart: unless-stopped
    profiles: ["rabbitmq"]
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-automation}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-change-me-rabbitmq}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-whatsapp}
    ports:
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - whatsapp-platform
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  sessions_data:
  valkey_data:
  # Kept as a rollback backup; the Redis RDB v12 file is not readable by Valkey.
  redis_data:
  postgres_data:
  rabbitmq_data:

networks:
  whatsapp-platform:
    name: whatsapp-platform
