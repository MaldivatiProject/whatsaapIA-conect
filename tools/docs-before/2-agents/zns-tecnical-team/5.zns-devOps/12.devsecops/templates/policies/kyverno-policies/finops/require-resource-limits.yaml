# =============================================================================
# KYVERNO POLICY: Require Resource Limits
# FinOps Cost Control Policy
# =============================================================================
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require Resource Limits
    policies.kyverno.io/category: FinOps, Best Practices
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.6.0
    policies.kyverno.io/description: >-
      Containers must have CPU and memory limits defined to enable proper 
      resource tracking, prevent resource exhaustion, and support FinOps 
      cost allocation. This policy validates that all containers in a Pod 
      have CPU and memory limits specified.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    # Rule 1: Require memory limits
    - name: require-memory-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
      preconditions:
        all:
          - key: "{{request.operation || 'BACKGROUND'}}"
            operator: AnyIn
            value:
              - CREATE
              - UPDATE
      validate:
        message: >-
          Container {{request.object.spec.containers[].name}} must have 
          memory limits specified for FinOps cost tracking.
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    memory: "?*"
    
    # Rule 2: Require CPU limits
    - name: require-cpu-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
      preconditions:
        all:
          - key: "{{request.operation || 'BACKGROUND'}}"
            operator: AnyIn
            value:
              - CREATE
              - UPDATE
      validate:
        message: >-
          Container {{request.object.spec.containers[].name}} must have 
          CPU limits specified for FinOps cost tracking.
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    cpu: "?*"
    
    # Rule 3: Require memory requests
    - name: require-memory-requests
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: >-
          Container {{request.object.spec.containers[].name}} must have 
          memory requests specified for capacity planning.
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    memory: "?*"
    
    # Rule 4: Require CPU requests
    - name: require-cpu-requests
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: >-
          Container {{request.object.spec.containers[].name}} must have 
          CPU requests specified for capacity planning.
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    cpu: "?*"

---
# =============================================================================
# KYVERNO POLICY: Limit Resources by Environment
# FinOps Cost Control Policy
# =============================================================================
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: limit-resources-by-environment
  annotations:
    policies.kyverno.io/title: Limit Resources by Environment
    policies.kyverno.io/category: FinOps
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Enforce maximum resource limits based on environment to prevent 
      cost overruns in non-production environments.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    # Development environment limits
    - name: dev-memory-limit
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - "dev-*"
                - "development"
      validate:
        message: >-
          Development environment containers cannot request more than 4Gi memory.
          Requested: {{request.object.spec.containers[].resources.limits.memory}}
        deny:
          conditions:
            any:
              - key: "{{request.object.spec.containers[].resources.limits.memory}}"
                operator: GreaterThan
                value: "4Gi"
    
    # Staging environment limits
    - name: staging-memory-limit
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - "staging"
                - "stg-*"
      validate:
        message: >-
          Staging environment containers cannot request more than 8Gi memory.
          Requested: {{request.object.spec.containers[].resources.limits.memory}}
        deny:
          conditions:
            any:
              - key: "{{request.object.spec.containers[].resources.limits.memory}}"
                operator: GreaterThan
                value: "8Gi"

---
# =============================================================================
# KYVERNO POLICY: Limit Replicas in Non-Production
# FinOps Cost Control Policy
# =============================================================================
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: limit-replicas-non-production
  annotations:
    policies.kyverno.io/title: Limit Replicas in Non-Production
    policies.kyverno.io/category: FinOps
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Deployment
    policies.kyverno.io/description: >-
      Limit the number of replicas in non-production environments to 
      prevent unnecessary cost.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: limit-dev-replicas
      match:
        any:
          - resources:
              kinds:
                - Deployment
              namespaces:
                - "dev-*"
                - "development"
      validate:
        message: >-
          Development deployments cannot have more than 2 replicas.
          Requested: {{request.object.spec.replicas}}
        pattern:
          spec:
            replicas: "<=2"
    
    - name: limit-staging-replicas
      match:
        any:
          - resources:
              kinds:
                - Deployment
              namespaces:
                - "staging"
                - "stg-*"
      validate:
        message: >-
          Staging deployments cannot have more than 3 replicas.
          Requested: {{request.object.spec.replicas}}
        pattern:
          spec:
            replicas: "<=3"
